id: dev.idiolect.vocab.purpose-v1
description: >
  Reference purpose vocabulary for ThUse. Captures the "for what
  end" dimension of a Use, distinct from the Action dimension. The
  entries here are illustrative; communities fork and extend under
  their own vocabulary id.

  Each entry carries a `class:` field naming the attitudinal
  composition it's an instance of. Most purposes default to
  `asserted_use` because the invoking party is asserting the end
  their action serves; consumers that want permission/prohibition
  semantics target the purpose under `permitted_use` /
  `prohibited_use` in their own vocabulary.

  Subsumption is closed-world-with-default: subsumes(any_purpose, x)
  holds for every x.
world: closed-with-default
top: any_purpose
actions:
  - id: any_purpose
    parents: []
    class: dev.idiolect.asserted_use
  - id: commercial
    parents: [any_purpose]
    class: dev.idiolect.asserted_use
  - id: non_commercial
    parents: [any_purpose]
    class: dev.idiolect.asserted_use
  - id: academic
    parents: [non_commercial]
    class: dev.idiolect.asserted_use
  - id: research
    parents: [academic]
    class: dev.idiolect.asserted_use
  - id: pedagogy
    parents: [academic]
    class: dev.idiolect.asserted_use
  - id: preservation
    parents: [non_commercial]
    class: dev.idiolect.asserted_use
  - id: engineering_internal
    parents: [any_purpose]
    class: dev.idiolect.asserted_use
