id: dev.idiolect.theory.condition
description: >
  Structured predicates over an invocation Context. Extends
  ThPredicate — the boolean combinator machinery is inherited;
  ThCondition adds context-component accessors (source, target,
  purpose, action, community, data-properties) and the atomic
  predicates that produce ThPredicate.Predicate values.
theory: ThCondition
extends: [ThPredicate]
sorts:
  - name: Schema
  - name: Action
  - name: Purpose
  - name: Community
  - name: Property
  - name: PropertySet
ops:
  # Context-component accessors. Subject plays the role of the
  # context — it's what atomic predicates inspect at evaluation
  # time, via these accessors.
  - { name: source, input: Subject, output: Schema }
  - { name: target, input: Subject, output: Schema }
  - { name: context_purpose, input: Subject, output: Purpose }
  - { name: context_action, input: Subject, output: Action }
  - { name: community, input: Subject, output: Community }
  - { name: dataProperties, input: Subject, output: PropertySet }
  # Atomic predicates.
  - { name: source_is, inputs: [{ sort: Schema }], output: Predicate }
  - { name: target_is, inputs: [{ sort: Schema }], output: Predicate }
  - { name: action_subsumed_by, inputs: [{ sort: Action }], output: Predicate }
  - { name: purpose_subsumed_by, inputs: [{ sort: Purpose }], output: Predicate }
  - { name: data_has, inputs: [{ sort: Property }], output: Predicate }
equations:
  - name: source_is_holds
    lhs: "holds(source_is(s), ctx)"
    rhs: "eq(source(ctx), s)"
  - name: target_is_holds
    lhs: "holds(target_is(s), ctx)"
    rhs: "eq(target(ctx), s)"
  - name: action_subsumed_by_holds
    lhs: "holds(action_subsumed_by(a), ctx)"
    rhs: "subsumes(a, context_action(ctx))"
  - name: purpose_subsumed_by_holds
    lhs: "holds(purpose_subsumed_by(p), ctx)"
    rhs: "subsumes(p, context_purpose(ctx))"
