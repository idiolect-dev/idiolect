id: dev.idiolect.theory.eligibility
description: >
  Predicates over claimants. Extends ThPredicate — the boolean
  combinator machinery is inherited; ThEligibility adds the atomic
  predicates specific to claimant-typed subjects (is_member_of,
  has_verification_for, is_did).
theory: ThEligibility
extends: [ThPredicate]
sorts:
  - name: Community
  - name: LensProperty
  - name: Did
ops:
  # Atomic predicates. Subject plays the role of the Claimer.
  - { name: is_member_of, inputs: [{ sort: Community }], output: Predicate }
  - { name: has_verification_for, inputs: [{ sort: LensProperty }], output: Predicate }
  - { name: is_did, inputs: [{ sort: Did }], output: Predicate }
