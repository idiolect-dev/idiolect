id: dev.idiolect.theory.purpose
description: >
  Content theory for why a translation was performed. Composes with
  ThUse from dev.attitudes.intent.use: a purpose is a use the
  invoker attests they are performing. Communities supply the
  action vocabulary.
theory: ThPurpose
sorts:
  - name: Purpose
  - name: Action
  - name: Material
  - name: Actor
  - name: Vocabulary
ops:
  - { name: action, input: Purpose, output: Action }
  - { name: material, input: Purpose, output: Material }
  - { name: actor, input: Purpose, output: Actor }
  - { name: vocabulary, input: Purpose, output: Vocabulary }
  # subsumption over the community-supplied action hierarchy.
  - { name: subsumes, inputs: [{ sort: Action }, { sort: Action }], output: Bool }
