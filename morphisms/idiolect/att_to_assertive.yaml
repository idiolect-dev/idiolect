id: dev.idiolect.morphisms.att_to_assertive
description: >
  The inclusion morphism ThAtt ↪ ThAssertive. An assertion is an
  attitude; the holder/content/att sorts map identity-wise, and
  the extract operation is projection back to the underlying Att.
morphism:
  source: ThAtt
  target: ThAssertive
  sort_map:
    Holder: Holder
    Content: Content
    Att: Att
  op_map:
    holder: holder
    content: content
