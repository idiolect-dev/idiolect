id: dev.idiolect.morphisms.att_to_bouletic
description: >
  The inclusion morphism ThAtt ↪ ThBouletic. A desire is an
  attitude; the holder/content/att sorts map identity-wise.
morphism:
  source: ThAtt
  target: ThBouletic
  sort_map:
    Holder: Holder
    Content: Content
    Att: Att
  op_map:
    holder: holder
    content: content
