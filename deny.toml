# cargo-deny policy.
#
# Enforced in CI via the `cargo-deny` job. Four concerns covered:
#
# - advisories: active RUSTSEC advisories against workspace deps.
# - licenses: transitive dep licences must be on the allow-list.
# - bans: specific crates forbidden outright.
# - sources: git deps must come from an approved source list.
#
# Changes to this file touch supply-chain policy; review accordingly.

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-apple-darwin" },
]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ---------------------------------------------------------------
# Advisories
# ---------------------------------------------------------------
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Any active advisory is a CI failure. Transient exceptions go in
# the `ignore` list with a link to tracking issue.
yanked = "deny"
ignore = []

# ---------------------------------------------------------------
# Licences
# ---------------------------------------------------------------
[licenses]
version = 2
# OSI-approved permissive licences we accept transitively. Copyleft
# (GPL, AGPL, LGPL) is blocked by default; a dep on a copyleft crate
# needs an explicit `exceptions` entry and review.
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.9
exceptions = []

[[licenses.clarify]]
# ring's licence is a blend we accept under the same OpenSSL-style
# terms the ecosystem treats as MIT-equivalent.
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ---------------------------------------------------------------
# Bans
# ---------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Crates we refuse outright — security or licence reasons, or known
# unmaintained. Empty by default; add with a rationale comment.
deny = []

# Permitted duplicates. Keep the list short; each entry is a
# reviewed exception to the "one version per crate" rule.
skip = []
skip-tree = []

# ---------------------------------------------------------------
# Sources
# ---------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    # panproto is intentionally pinned to a git tag; idiolect
    # coordinates its updates explicitly rather than via dependabot.
    "https://github.com/panproto/panproto.git",
]
