# Tag-triggered release pipeline.
#
# Trigger: pushing a tag matching `v*` (e.g. `v0.1.0`). The tag name
# after the `v` is treated as the release version. The workspace
# Cargo.toml + packages/schema/package.json are expected to match
# that version before tagging; the workflow verifies the invariant
# as its first job and refuses to release on mismatch.
#
# Outputs, in order of publication:
#
#   1. GitHub Release with:
#      - compressed binary archives for every (target, binary) pair
#      - SHA-256 checksums of every archive, signed by cosign
#      - SBOMs (SPDX JSON) for each container image + the source tarball
#      - release notes extracted from CHANGELOG.md's [Unreleased] section
#   2. Multi-arch container images on ghcr.io:
#      - ghcr.io/idiolect-dev/orchestrator:<version>, :latest
#      - ghcr.io/idiolect-dev/observer:<version>, :latest
#      - signed with cosign keyless (sigstore OIDC via GitHub Actions)
#   3. @idiolect-dev/schema npm package.
#   4. Publishable Rust crates to crates.io
#      (idiolect-records, idiolect-lens, idiolect-indexer, idiolect-oauth)
#      in topological order.
#
# Every signed artifact can be verified by a downstream consumer with
# `cosign verify-blob` (binaries) or `cosign verify` (containers).
# See docs/ci-cd.md for consumer instructions.
#
# Secrets required:
#   CARGO_REGISTRY_TOKEN    crates.io publish token, conditional
# npm uses OIDC via Trusted Publishers; no long-lived token needed.
#
# Permissions granted per-job rather than at workflow scope so a
# compromise of one job cannot mint tokens for another.

name: release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_BUILD_JOBS: "4"
  RUST_BACKTRACE: "1"

jobs:
  # ---------------------------------------------------------------
  # Version sanity check. Extracts the version from the tag and
  # confirms it matches the workspace manifests. A mismatch would
  # ship incorrectly-labeled artifacts, so it's a release blocker.
  # ---------------------------------------------------------------
  verify-version:
    name: verify version coherence
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: extract
        name: extract version from tag
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_ENV"
          echo "version=$version" >> "$GITHUB_ENV"

      - name: assert Cargo.toml version matches
        run: |
          workspace_version=$(grep -A 1 '^\[workspace.package\]' Cargo.toml \
            | grep '^version' \
            | head -1 \
            | cut -d'"' -f2)
          if [ "$workspace_version" != "$version" ]; then
            echo "::error::workspace Cargo.toml version ($workspace_version) != tag version ($version)"
            exit 1
          fi

      - name: assert @idiolect-dev/schema package.json version matches
        run: |
          pkg_version=$(jq -r '.version' packages/schema/package.json)
          if [ "$pkg_version" != "$version" ]; then
            echo "::error::@idiolect-dev/schema package.json version ($pkg_version) != tag version ($version)"
            exit 1
          fi

  # ---------------------------------------------------------------
  # Run the full CI suite one more time against the tagged commit.
  # A release never ships without a green test matrix at the exact
  # commit being released. Re-runs instead of relying on prior CI
  # because the tag may have been pushed without a preceding PR.
  # ---------------------------------------------------------------
  ci-on-tag:
    name: ci (on tag)
    needs: verify-version
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  # ---------------------------------------------------------------
  # Build release binaries for a matrix of targets. Each job
  # produces `.tar.gz` archives (Unix) containing the stripped
  # binary + SHA-256 sidecar, uploaded as workflow artifacts. A
  # later job consolidates them, signs, and publishes.
  # ---------------------------------------------------------------
  build-binaries:
    name: build ${{ matrix.bin }} (${{ matrix.target }})
    needs: [verify-version, ci-on-tag]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          # CLI is the broadest platform target — any user who wants
          # `idiolect` locally.
          - bin: idiolect
            crate: idiolect-cli
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            features: ""
          - bin: idiolect
            crate: idiolect-cli
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            features: ""
          - bin: idiolect
            crate: idiolect-cli
            target: aarch64-apple-darwin
            runner: macos-14
            features: ""
          # Cross-compiled from macos-14 (ARM host) because macos-13
          # runners are retiring and queue indefinitely. The Apple
          # toolchain cross-compiles natively once the target is added
          # via `rustup target add`.
          - bin: idiolect
            crate: idiolect-cli
            target: x86_64-apple-darwin
            runner: macos-14
            features: ""
          # Daemon binaries: linux-only (these are containerized;
          # macOS binaries aren't a deployment target).
          - bin: idiolect-orchestrator
            crate: idiolect-orchestrator
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            features: "--features daemon"
          - bin: idiolect-orchestrator
            crate: idiolect-orchestrator
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            features: "--features daemon"
          - bin: idiolect-observer
            crate: idiolect-observer
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            features: "--features daemon"
          - bin: idiolect-observer
            crate: idiolect-observer
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            features: "--features daemon"

    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
          targets: ${{ matrix.target }}

      # rust-toolchain.toml re-selects the pinned toolchain when cargo
      # runs, and its profile = "minimal" drops the target added above.
      # Add it again against whatever rustup ends up using.
      - name: ensure target is installed for pinned toolchain
        run: rustup target add ${{ matrix.target }}

      - name: install cross-compile toolchain (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          shared-key: "release-${{ matrix.target }}"

      - name: cargo build --release
        run: >
          cargo build
          --release
          --locked
          -p ${{ matrix.crate }}
          --bin ${{ matrix.bin }}
          --target ${{ matrix.target }}
          ${{ matrix.features }}

      - name: stage + strip binary
        shell: bash
        run: |
          set -euo pipefail
          staging="${{ matrix.bin }}-${{ needs.verify-version.outputs.version }}-${{ matrix.target }}"
          mkdir -p "dist/$staging"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/$staging/"
          cp README.md LICENSE "dist/$staging/" 2>/dev/null || true
          if [ "${{ runner.os }}" = "Linux" ] && [ "${{ matrix.target }}" != "aarch64-unknown-linux-gnu" ]; then
            strip "dist/$staging/${{ matrix.bin }}" || true
          fi
          tar -C dist -czf "dist/$staging.tar.gz" "$staging"
          shasum -a 256 "dist/$staging.tar.gz" > "dist/$staging.tar.gz.sha256"
          echo "archive=dist/$staging.tar.gz" >> "$GITHUB_ENV"
          echo "checksum=dist/$staging.tar.gz.sha256" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.bin }}-${{ matrix.target }}
          path: |
            ${{ env.archive }}
            ${{ env.checksum }}
          retention-days: 7
          if-no-files-found: error

  # ---------------------------------------------------------------
  # Multi-arch container images for the two daemons. Each image is
  # built from its Dockerfile and pushed to ghcr.io with two tags:
  # the release version and `latest`. cosign keyless signs via the
  # workflow's OIDC token; sigstore stores the signature in the
  # rekor transparency log.
  # ---------------------------------------------------------------
  build-containers:
    name: container ${{ matrix.image }}
    needs: [verify-version, ci-on-tag]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      # `contents: write` so anchore/sbom-action can attach the
      # generated SBOM to the GitHub release as an asset.
      contents: write
      packages: write
      id-token: write     # cosign keyless signing
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: orchestrator
            dockerfile: deploy/docker/orchestrator.Dockerfile
          - image: observer
            dockerfile: deploy/docker/observer.Dockerfile
    env:
      registry: ghcr.io
      owner: idiolect-dev
    steps:
      - uses: actions/checkout@v4

      # QEMU is only needed for cross-arch builds. Uncomment when the
      # container matrix goes back to including linux/arm64.
      # - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: derive image tags
        id: tags
        run: |
          base="${{ env.registry }}/${{ env.owner }}/${{ matrix.image }}"
          echo "tags=$base:${{ needs.verify-version.outputs.version }},$base:latest" >> "$GITHUB_OUTPUT"
          echo "base=$base" >> "$GITHUB_OUTPUT"

      - name: build + push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          # linux/arm64 via QEMU adds ~40 minutes per release. Dropped
          # until a native ARM runner is wired up. Uncomment the full
          # line (and the setup-qemu-action above) to restore it.
          platforms: linux/amd64
          # platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          push: true
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      - name: install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      - name: sign image (keyless, sigstore)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            "${{ steps.tags.outputs.base }}@${{ steps.build.outputs.digest }}"

      - name: install syft + generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.tags.outputs.base }}:${{ needs.verify-version.outputs.version }}
          format: spdx-json
          output-file: sbom-${{ matrix.image }}.spdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image }}
          path: sbom-${{ matrix.image }}.spdx.json
          retention-days: 30
          if-no-files-found: error

  # ---------------------------------------------------------------
  # Source tarball + aggregate checksums + signed release manifest.
  # Produces a reproducible `idiolect-<version>-src.tar.gz` with the
  # exact tree at the tagged commit (no .git, no target, no
  # node_modules). Sign its sha256 with cosign so downstream
  # verifiers have a canonical "this is what was released" anchor.
  # ---------------------------------------------------------------
  source-tarball:
    name: source tarball
    needs: verify-version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: build source tarball
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.verify-version.outputs.version }}"
          name="idiolect-$version-src"
          mkdir -p dist
          git archive --format=tar.gz --prefix="$name/" -o "dist/$name.tar.gz" HEAD
          shasum -a 256 "dist/$name.tar.gz" > "dist/$name.tar.gz.sha256"

      - name: install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      - name: sign source checksum
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob --yes \
            --bundle "dist/idiolect-${{ needs.verify-version.outputs.version }}-src.tar.gz.sig" \
            "dist/idiolect-${{ needs.verify-version.outputs.version }}-src.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          path: dist/*
          retention-days: 30
          if-no-files-found: error

  # ---------------------------------------------------------------
  # Consolidate every binary archive into one `checksums.txt`,
  # sign it with cosign, publish the GitHub Release with all
  # artifacts attached, and extract release notes from the
  # [Unreleased] section of CHANGELOG.md.
  # ---------------------------------------------------------------
  publish-release:
    name: publish GitHub Release
    needs: [verify-version, build-binaries, build-containers, source-tarball]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # docker/build-push-action@v6 uploads internal *.dockerbuild
      # provenance blobs whose archives intermittently fail to
      # extract via download-artifact@v4. Restrict the download to
      # artifacts this job actually consumes (binaries, SBOMs,
      # checksums, source tarball) so a flaky dockerbuild artifact
      # doesn't block the release.
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "{bin-*,sbom-*,*spdx.json,source-tarball}"

      - name: flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \
            \( -name '*.tar.gz' -o -name '*.sha256' -o -name '*.spdx.json' -o -name '*.sig' \) \
            -exec cp {} release/ \;

      - name: aggregate checksums
        working-directory: release
        run: |
          : > checksums.txt
          for f in *.tar.gz; do
            shasum -a 256 "$f" >> checksums.txt
          done

      - name: install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      - name: sign checksums
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob --yes \
            --bundle release/checksums.txt.sig \
            release/checksums.txt

      - name: extract release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'EOF' > release_notes.md
          import re, pathlib
          text = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          # Grab everything between [Unreleased] and the next `## ` header.
          m = re.search(r"##\s*\[Unreleased\][^\n]*\n(.*?)(?=\n##\s)", text, re.S)
          body = m.group(1).strip() if m else ""
          if not body:
              body = "_No release notes supplied for this version._"
          print(body)
          EOF
          echo "path=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: ${{ steps.notes.outputs.path }}
          name: "idiolect ${{ needs.verify-version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(needs.verify-version.outputs.version, '-') }}
          generate_release_notes: true

  # ---------------------------------------------------------------
  # Publish @idiolect-dev/schema to npm via Trusted Publishers (OIDC).
  # No long-lived NPM_TOKEN — npm is configured at
  # npmjs.com/package/@idiolect-dev/schema/access to trust this
  # repo + workflow filename, and the npm CLI exchanges the job's
  # OIDC token for short-lived publish credentials automatically
  # when `--provenance` is set.
  # ---------------------------------------------------------------
  publish-npm:
    name: publish @idiolect-dev/schema
    needs: [verify-version, publish-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ !contains(needs.verify-version.outputs.version, '-') }}
    permissions:
      contents: read
      id-token: write     # OIDC token for npm Trusted Publishers
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.2"

      - name: install dependencies
        run: bun install --frozen-lockfile

      - name: typecheck
        run: bun run typecheck

      - name: build dist/
        # `package.json` declares `"main": "./dist/index.js"` and
        # `"files": ["dist", "src", ...]`, so the publish must include
        # the built dist/ tree. The `bun run build` script wipes
        # dist/ and rebuilds the bundled `.js` plus tsc-emitted `.d.ts`
        # — without this step npm publish ships only `src/` and
        # consumers see "Cannot find module @idiolect-dev/schema".
        # (v0.4.0 shipped without dist/ for exactly this reason; the
        # earlier v0.3.0 publish was driven manually from a developer
        # machine where the build step was implicit.)
        run: bun run build

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: fetch a recent npm into a private directory
        # npm Trusted Publishers' OIDC handshake landed in npm
        # 11.5.1. The runner image's bundled npm is older AND its
        # tree is missing `promise-retry` (so it can't even invoke
        # `install` to upgrade itself), and corepack-managed shims
        # don't sit ahead of the bundled binary in PATH. The only
        # reliable path is downloading a fresh npm tarball from the
        # registry and invoking it directly via `node`.
        run: |
          mkdir -p "$RUNNER_TEMP/npm-bin"
          curl -fsSL https://registry.npmjs.org/npm/-/npm-11.13.0.tgz \
            | tar -xz -C "$RUNNER_TEMP/npm-bin" --strip-components=1
          node "$RUNNER_TEMP/npm-bin/bin/npm-cli.js" --version

      - name: publish
        working-directory: packages/schema
        run: |
          node "$RUNNER_TEMP/npm-bin/bin/npm-cli.js" \
            publish --provenance --access public

  # ---------------------------------------------------------------
  # Publish the publishable crates to crates.io in topological
  # order. Guarded on CARGO_REGISTRY_TOKEN being set.
  # ---------------------------------------------------------------
  publish-crates:
    name: publish crates.io
    needs: [verify-version, publish-release]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ !contains(needs.verify-version.outputs.version, '-') }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "publish-crates"

      - name: publish in topological order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::warning::CARGO_REGISTRY_TOKEN not set; skipping crates.io publish"
            exit 0
          fi
          # Order matters: each crate's dependencies must already be
          # on crates.io by the time it publishes. The list is the set
          # of publishable = true crates in topological order; every
          # panproto-dependent crate (lens, oauth, migrate, verify) is
          # `publish = false` at the workspace level until panproto
          # lands on crates.io, so they're deliberately absent here.
          for crate in idiolect-records idiolect-identity idiolect-indexer; do
            echo "::group::publish $crate"
            cargo publish -p "$crate" --locked --no-verify || {
              code=$?
              # Idempotent re-runs: crates.io returns 400 for an
              # already-published exact version.
              if cargo search "$crate" | grep -q "^$crate = \"${{ needs.verify-version.outputs.version }}\""; then
                echo "$crate ${{ needs.verify-version.outputs.version }} already published; continuing"
              else
                exit $code
              fi
            }
            echo "::endgroup::"
          done
