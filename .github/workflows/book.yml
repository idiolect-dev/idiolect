# Build the mdbook and sync it into idiolect-dev/idiolect-dev.github.io
# under /book/, so it lands at idiolect.dev/book/.
#
# The org's landing-page repo (idiolect-dev/idiolect-dev.github.io)
# owns the custom domain `idiolect.dev` via its Pages CNAME claim;
# it serves from `main` branch root in "legacy" Pages mode. To put
# the book at idiolect.dev/book/ we commit the rendered tree into
# that repo's `/book/` subdirectory; Pages picks it up on push.
#
# Cross-repo write needs a token with `contents: write` on
# idiolect-dev/idiolect-dev.github.io. The workflow reads it from
# the repo secret `LANDING_PAGE_PAT`. Operator setup:
#
#   1. Create a fine-grained PAT scoped to
#      idiolect-dev/idiolect-dev.github.io with `contents: write`.
#   2. Add as a repo secret on idiolect-dev/idiolect named
#      `LANDING_PAGE_PAT`.

name: book

on:
  push:
    branches: [main]
    paths:
      - "docs/book/**"
      - ".github/workflows/book.yml"
  workflow_dispatch: {}

concurrency:
  group: book-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-sync:
    name: build + sync to landing-page repo
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: book-mdbook

      - name: install mdbook + preprocessors
        run: |
          set -euo pipefail
          cargo install --locked mdbook         --version "0.4.40"
          cargo install --locked mdbook-katex   --version "0.9.2"
          cargo install --locked mdbook-mermaid --version "0.14.0"

      - name: build mdbook
        working-directory: docs/book
        run: mdbook build

      # Check out the landing-page repo into a sibling directory.
      # We use a separate PAT (not GITHUB_TOKEN, which is scoped to
      # this repo only) so we can push back.
      - name: checkout landing-page repo
        uses: actions/checkout@v4
        with:
          repository: idiolect-dev/idiolect-dev.github.io
          token: ${{ secrets.LANDING_PAGE_PAT }}
          path: landing
          fetch-depth: 1

      # Replace landing/book/ with the freshly built tree. Using
      # rsync with --delete keeps the destination identical to the
      # build output — no stale files survive a renamed page.
      - name: sync book into landing/book/
        run: |
          set -euo pipefail
          mkdir -p landing/book
          rsync -a --delete docs/book/book/ landing/book/

      - name: commit + push if changed
        working-directory: landing
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add book
          if git diff --cached --quiet; then
            echo "no book changes to publish"
            exit 0
          fi
          # Pin the source commit so an operator looking at the
          # landing-page repo can find the build's input.
          git commit -m "book: sync from idiolect@${GITHUB_SHA::12}"
          git push
