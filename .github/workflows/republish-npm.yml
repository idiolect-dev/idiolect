# Manual republish of @idiolect-dev/schema for an existing tag.
#
# The tag-triggered release workflow runs the published version of
# itself (the workflow file at the tagged commit), so a workflow
# bug discovered after a tag landed cannot be hot-fixed by pushing
# to main and re-running the failed job. This workflow exists to
# retarget the npm publish step at an arbitrary tag using whatever
# release.yml on `main` happens to look like at dispatch time.
#
# Two auth modes are supported:
#
# - If `NPM_TOKEN` is set as a repo secret, publish with classic
#   token auth (no provenance attestation).
# - Otherwise, publish via Trusted Publishers (OIDC + provenance).
#   This requires npmjs.com/package/<name>/access to allowlist
#   this repo + workflow filename.
#
# Either way, the bundled npm CLI on the runner image is too old
# for the Trusted Publishers OIDC handshake (≥ 11.5.1) and is
# missing `promise-retry`, so we fetch a fresh tarball first.
name: republish-npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to republish (e.g. v0.3.0)"
        required: true
        type: string

jobs:
  publish:
    name: publish @idiolect-dev/schema for ${{ inputs.tag }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.2"

      - name: install dependencies
        run: bun install --frozen-lockfile

      - name: typecheck
        run: bun run typecheck

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: fetch a recent npm into a private directory
        # The runner image's bundled npm is two issues at once:
        # its tree is missing `promise-retry` (so it can't run
        # `install` to upgrade itself even with `--force`), and
        # corepack-managed npm shims sit behind it in PATH. Trusted
        # Publishers' OIDC handshake landed in npm 11.5.1, so the
        # only reliable path is downloading a fresh npm tarball
        # straight from the registry and invoking it directly via
        # `node`.
        run: |
          mkdir -p "$RUNNER_TEMP/npm-bin"
          curl -fsSL https://registry.npmjs.org/npm/-/npm-11.13.0.tgz \
            | tar -xz -C "$RUNNER_TEMP/npm-bin" --strip-components=1
          node "$RUNNER_TEMP/npm-bin/bin/npm-cli.js" --version

      - name: publish
        working-directory: packages/schema
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::notice::publishing with NPM_TOKEN (no provenance)"
            node "$RUNNER_TEMP/npm-bin/bin/npm-cli.js" \
              publish --access public
          else
            echo "::notice::no NPM_TOKEN; publishing via Trusted Publishers OIDC"
            node "$RUNNER_TEMP/npm-bin/bin/npm-cli.js" \
              publish --provenance --access public
          fi
